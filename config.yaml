stt:
  provider: whisper_api        # whisper_local / whisper_api 선택
  whisper_local:
    model_size: medium           # tiny / base / small / medium / large
  whisper_api:
    api_key: ${OPENAI_API_KEY}

llm:
  provider: anthropic            # anthropic / ollama 선택
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-5
    max_tokens: 4096
  ollama:
    base_url: http://localhost:11434
    model: llama3.1
    timeout: 300

publisher:
  provider: notion               # confluence / notion 선택
  confluence:
    base_url: https://hectoinno.atlassian.net/wiki
    space_key: TF
    parent_page_id: "323190803"
    user_email: eunhyekim@hecto.co.kr
    api_token: ${ATLASSIAN_API_TOKEN}
  notion:
    parent_page_id: "3413037f90f18059b795cefabf60ea19"
    template_page_id: "3413037f90f180c793f3ea63ad56af46"
    api_token: ${NOTION_API_TOKEN}

trigger:
  provider: slack                # slack / naverworks 선택
  slack:
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
  naverworks:
    client_id: ${NAVERWORKS_CLIENT_ID}
    client_secret: ${NAVERWORKS_CLIENT_SECRET}
    service_account: ${NAVERWORKS_SERVICE_ACCOUNT}
    bot_id: ${NAVERWORKS_BOT_ID}
    bot_secret: ${NAVERWORKS_BOT_SECRET}
    private_key: ${NAVERWORKS_PRIVATE_KEY}       # PEM 문자열 직접 주입 (개행은 \n 그대로)
    # private_key_path: /app/secrets/naverworks-private.key  # 또는 파일 마운트
    callback_host: 0.0.0.0
    callback_port: 3000
    callback_path: /callback
